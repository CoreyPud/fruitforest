name: Validate

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  hassfest:
    name: Home Assistant validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run hassfest
        uses: home-assistant/actions/hassfest@d56d093b9ab8d2105bc0cb6ee9bcc0ef4ec8b96d

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Run HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a
        with:
          category: integration
          ignore: brands

  project-tests:
    name: Routing and Shortcut tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Test routing helpers
        run: python3 -m unittest discover -s tests -v
      - name: Regenerate and validate Shortcuts
        run: |
          node tools/generate-shortcuts.mjs
          node tools/test-generated-shortcuts.mjs
          git diff --exit-code -- shortcuts/generated
